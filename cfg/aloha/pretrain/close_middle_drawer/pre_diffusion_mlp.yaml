defaults:
  - _self_

hydra:
  run:
    dir: ${logdir}

_target_: agent.pretrain.train_diffusion_agent.TrainDiffusionAgent

name: ${env}_pre_diffusion_mlp_ta${horizon_steps}_td${denoising_steps}_ep${train.n_epochs}
logdir: /home/lidongquan/lidongquan-data/dsrl/logs/aloha-pretrain/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}

train_dataset_path: /home/lidongquan/lidongquan-data/dsrl/datasets/close_the_middle_drawer_dppo/train_10ep.npz

seed: 42
device: cuda
env: close_middle_drawer
obs_dim: 28
action_dim: 14
denoising_steps: 20
horizon_steps: 4
cond_steps: 1

wandb: null

train:
  n_epochs: 3500
  max_updates: 3500
  batch_size: 256
  learning_rate: 1e-4
  weight_decay: 1e-6
  lr_scheduler:
    first_cycle_steps: 3500
    warmup_steps: 100
    min_lr: 1e-5
  save_model_freq: 250
  log_freq: 1

model:
  _target_: model.diffusion.diffusion.DiffusionModel
  predict_epsilon: True
  denoised_clip_value: 1.0
  network:
    _target_: model.diffusion.mlp_diffusion.DiffusionMLP
    time_dim: 16
    mlp_dims: [512, 512, 512]
    residual_style: True
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    horizon_steps: ${horizon_steps}
    action_dim: ${action_dim}
  horizon_steps: ${horizon_steps}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  denoising_steps: ${denoising_steps}
  device: ${device}
  use_ddim: True
  ddim_steps: 8

ema:
  decay: 0.995

train_dataset:
  _target_: agent.dataset.sequence.StitchedSequenceDataset
  dataset_path: ${train_dataset_path}
  horizon_steps: ${horizon_steps}
  cond_steps: ${cond_steps}
  max_n_episodes: 10
  device: ${device}
